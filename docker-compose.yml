version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend/lancedb_data:/app/lancedb_data
      - ./backend/uploads:/app/uploads
      - ./backend/candidate_screening.db:/app/candidate_screening.db
      - ./backend/candidates.db:/app/candidates.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
